server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Apple App Site Association — must be served as application/json with no
    # extension so iOS / swcd will accept it for Universal Links. Apple does
    # not follow redirects, so this MUST resolve directly.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Apple Pay merchant domain association (extensionless) — same Content-Type
    # quirk: served as plain text per Apple's verification spec.
    location = /.well-known/apple-developer-merchantid-domain-association {
        default_type text/plain;
        try_files $uri =404;
    }

    # SPA history fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html (so new deploys are picked up)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
