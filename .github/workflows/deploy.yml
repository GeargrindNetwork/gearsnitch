name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve web build config
        run: |
          # Pin to the pretty public hostnames so the SPA bundle targets the
          # same origin its session cookies are scoped to (api.gearsnitch.com).
          # Using the ephemeral Cloud Run URL here bakes the raw *.run.app host
          # into the JS bundle, which defeats the cookie-based auth refresh and
          # every CORS/Worker fix applied at api.gearsnitch.com.
          API_URL="https://api.gearsnitch.com/api/v1"
          WS_URL="wss://ws.gearsnitch.com"
          GOOGLE_CLIENT_ID="$(gcloud secrets versions access latest --secret=google-oauth-client-id --project=gearsnitch 2>/dev/null || true)"
          APPLE_SERVICE_ID="$(gcloud secrets versions access latest --secret=apple-service-id --project=gearsnitch 2>/dev/null || true)"
          APPLE_REDIRECT_URI="$(gcloud secrets versions access latest --secret=apple-redirect-uri --project=gearsnitch 2>/dev/null || true)"
          if [ "$GOOGLE_CLIENT_ID" = "placeholder" ]; then
            GOOGLE_CLIENT_ID=""
          fi
          if [ "$APPLE_SERVICE_ID" = "placeholder" ]; then
            APPLE_SERVICE_ID=""
          fi
          if [ "$APPLE_REDIRECT_URI" = "placeholder" ]; then
            APPLE_REDIRECT_URI=""
          fi
          printf 'API_URL=%s\n' "$API_URL" >> "$GITHUB_ENV"
          printf 'WS_URL=%s\n' "$WS_URL" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID" >> "$GITHUB_ENV"
          printf 'APPLE_SERVICE_ID=%s\n' "$APPLE_SERVICE_ID" >> "$GITHUB_ENV"
          printf 'APPLE_REDIRECT_URI=%s\n' "$APPLE_REDIRECT_URI" >> "$GITHUB_ENV"

      - name: Submit Cloud Build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          gcloud builds submit \
            --config=infrastructure/cloudbuild/cloudbuild.yaml \
            --substitutions=_TAG=${SHORT_SHA},_REGION=us-central1,_PROJECT_ID=gearsnitch,_VITE_API_URL="${API_URL}",_VITE_WS_URL="${WS_URL}",_VITE_GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}",_VITE_APPLE_SERVICE_ID="${APPLE_SERVICE_ID}",_VITE_APPLE_REDIRECT_URI="${APPLE_REDIRECT_URI}" \
            --project=gearsnitch

      # RALPH #30: after the deploy lands, watch the new API revision for 5
      # minutes and auto-rollback if its 5xx rate exceeds the threshold.
      # The watcher is idempotent — running it against an already-healthy or
      # already-rolled-back service is a no-op.
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Watch Cloud Run for post-deploy 5xx and auto-rollback
        id: rollback_watch
        env:
          CLOUDRUN_SERVICE: gearsnitch-api
          CLOUDRUN_REGION: us-central1
          ROLLBACK_5XX_THRESHOLD_PCT: '5'
          ROLLBACK_WATCH_SECONDS: '300'
          ROLLBACK_SAMPLE_INTERVAL_SECONDS: '30'
        run: |
          set +e
          bash scripts/cloudrun-rollback-watcher.sh
          rc=$?
          echo "watcher_exit=$rc" >> "$GITHUB_OUTPUT"
          case "$rc" in
            0)
              echo "::notice title=Cloud Run health::Post-deploy watch completed cleanly; no rollback needed."
              exit 0
              ;;
            1)
              echo "::error title=Cloud Run auto-rollback::5xx rate exceeded ${ROLLBACK_5XX_THRESHOLD_PCT}% on ${CLOUDRUN_SERVICE} — traffic has been shifted back to the previous revision."
              exit 1
              ;;
            *)
              echo "::error title=Cloud Run watcher fatal::rollback-watcher exited $rc (not 0/1). Investigate gcloud/jq/auth."
              exit "$rc"
              ;;
          esac
