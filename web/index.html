<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="GearSnitch monitors your Bluetooth devices at the gym, alerts you instantly when something disconnects, and keeps your gear safe." />
    <title>GearSnitch - Never Lose Your Gym Gear Again</title>
    <script>
      // Apply saved / system theme before first paint to avoid FOUC.
      // Must stay in sync with STORAGE_KEY in src/lib/theme.tsx.
      (function () {
        try {
          var stored = localStorage.getItem('gearsnitch.theme');
          var theme = stored || 'dark';
          var resolved =
            theme === 'system'
              ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : theme;
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(resolved);
          root.style.colorScheme = resolved;
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
