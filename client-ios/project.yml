name: GearSnitch
options:
  bundleIdPrefix: com.gearsnitch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: TUZYDM227C
    CODE_SIGN_STYLE: Automatic

targets:
  GearSnitch:
    type: application
    platform: iOS
    sources:
      - path: GearSnitch
        excludes:
          - "**/*.xcassets"
          - "Features/Widgets/**"
      - path: GearSnitch/Resources/Assets.xcassets
        type: folder
    resources:
      - path: GearSnitch/Resources/Assets.xcassets
      - path: GearSnitch/Resources/Info.plist
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: GearSnitch/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gearsnitch.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: GearSnitch/GearSnitch.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:gearsnitch.com
        aps-environment: development

  GearSnitchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GearSnitchTests
        optional: true
    dependencies:
      - target: GearSnitch

  GearSnitchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GearSnitchUITests
        optional: true
    dependencies:
      - target: GearSnitch
