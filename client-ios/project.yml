name: GearSnitch
options:
  bundleIdPrefix: com.gearsnitch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  schemePathPrefix: ../../

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    exactVersion: 9.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: TUZYDM227C
    CODE_SIGN_STYLE: Automatic
    GS_GOOGLE_CLIENT_ID: ""
    GS_GOOGLE_SERVER_CLIENT_ID: ""
    GS_GOOGLE_REVERSED_CLIENT_ID: ""

targets:
  GearSnitch:
    type: application
    platform: iOS
    sources:
      - path: GearSnitch
        excludes:
          - "Features/Widgets/**"
          - "Resources/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: GearSnitch/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.gearsnitch.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: GearSnitch/GearSnitch.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:gearsnitch.com
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.gearsnitch.app
        com.apple.developer.in-app-payments:
          - merchant.gearsnitch.app
    dependencies:
      - package: GoogleSignIn
      - target: GearSnitchWidgets
        embed: true
    scheme:
      testTargets:
        - GearSnitchTests
        - GearSnitchUITests
      storeKitConfiguration: GearSnitch/Configuration/GearSnitch.storekit

  GearSnitchWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: GearSnitch/Features/Widgets
      - path: GearSnitch/Shared/Extensions/Color+GearSnitch.swift
      - path: GearSnitch/Shared/Widgets
    settings:
      base:
        INFOPLIST_FILE: GearSnitchWidgetExtension/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.gearsnitch.app.widgets
        PRODUCT_NAME: GearSnitchWidgets
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
    entitlements:
      path: GearSnitchWidgetExtension/GearSnitchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gearsnitch.app

  GearSnitchWatch:
    type: application
    platform: watchOS
    sources:
      - path: GearSnitchWatch
      - path: GearSnitch/Shared/Extensions/Color+GearSnitch.swift
        group: Shared
      - path: GearSnitch/Core/Watch/WatchSyncPayloads.swift
        group: Shared
    settings:
      base:
        INFOPLIST_FILE: GearSnitchWatch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.gearsnitch.app.watchkitapp
        PRODUCT_NAME: GearSnitchWatch
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.gearsnitch.app
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: NO
    entitlements:
      path: GearSnitchWatch/GearSnitchWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gearsnitch.app
        aps-environment: development
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    dependencies:
      - target: GearSnitchWatchWidgets
        embed: true

  GearSnitchWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: GearSnitchWatchWidgets
    settings:
      base:
        INFOPLIST_FILE: GearSnitchWatchWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.gearsnitch.app.watchkitapp.widgets
        PRODUCT_NAME: GearSnitchWatchWidgets
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.9"
    entitlements:
      path: GearSnitchWatchWidgets/GearSnitchWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gearsnitch.app

  GearSnitchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GearSnitchTests
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GearSnitch

  GearSnitchWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: GearSnitchWatchTests
        optional: true
      - path: GearSnitchWatchWidgets/WatchHRComplication.swift
        buildPhase: sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: GearSnitchWatch

  GearSnitchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GearSnitchUITests
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GearSnitch
