name: GearSnitch
options:
  bundleIdPrefix: com.gearsnitch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  schemePathPrefix: ../../

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    exactVersion: 9.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: TUZYDM227C
    CODE_SIGN_STYLE: Automatic
    GS_GOOGLE_CLIENT_ID: ""
    GS_GOOGLE_SERVER_CLIENT_ID: ""
    GS_GOOGLE_REVERSED_CLIENT_ID: ""

targets:
  GearSnitch:
    type: application
    platform: iOS
    sources:
      - path: GearSnitch
        excludes:
          - "Features/Widgets/**"
          - "Resources/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: GearSnitch/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.gearsnitch.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: GearSnitch/GearSnitch.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:gearsnitch.com
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
        com.apple.developer.usernotifications.critical-alerts: true
    dependencies:
      - package: GoogleSignIn
    scheme:
      testTargets:
        - GearSnitchTests
        - GearSnitchUITests
      storeKitConfiguration: GearSnitch/Configuration/GearSnitch.storekit

  GearSnitchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GearSnitchTests
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GearSnitch

  GearSnitchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GearSnitchUITests
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GearSnitch
